<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Auto redirect after 5 seconds -->
  <meta http-equiv="refresh" content="5;url=index.html" />

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: #fffaf2;
      color: #2f2f2f;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 30px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      opacity: 0.8;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 10px 20px;
      border: 1px solid #d8cfc4;
      border-radius: 25px;
      text-decoration: none;
      color: #2f2f2f;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #f3eadd;
      transform: translateY(-2px);
    }

    .emoji {
      font-size: 28px;
      margin-bottom: 10px;
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">
    <span class="emoji">✈️</span>

    <h1>This trip isn’t written yet</h1>

    <p>
      I’m probably still living it, remembering it,  
      or trying to find the right words for it.
    </p>

    <p>
      Check back soon — or wander somewhere else for now :)
    </p>

    <a href="index.html" class="btn">Back to Home</a>
  </div>
</body>
</html>
